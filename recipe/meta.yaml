{% set name = "httptools" %}
{% set version = "0.7.1" %}
{% set sha256 = "abd72556974f8e7c74a259655924a717a2365b236c882c3f6f8a45fe94703ac9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<39]

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - python
    - pip
    - setuptools ==80.9.0
    - cython
  run:
    - python

test:
  imports:
    - httptools
    - httptools.parser
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/MagicStack/httptools
  summary: Fast HTTP parser
  license: MIT
  license_family: MIT
  license_file: LICENSE
  description: |
    httptools is a Python binding for the nodejs HTTP parser.
  doc_url: https://github.com/MagicStack/httptools
  dev_url: https://github.com/MagicStack/httptools

extra:
  recipe-maintainers:
    - kszucs
    - xhochy
    - carlodri
